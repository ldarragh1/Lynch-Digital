<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" fill="none">
  <!-- Background -->
  <rect width="1128" height="191" fill="#0F172A"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#0F172A;stop-opacity:0" />
      <stop offset="60%" style="stop-color:#0F172A;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1128" height="191" fill="url(#grid)"/>
  <rect width="1128" height="191" fill="url(#glow)"/>

  <!-- Blue accent line at top -->
  <rect width="1128" height="3" fill="#2563EB"/>

  <!-- Blue glow circle -->
  <ellipse cx="200" cy="95" rx="180" ry="120" fill="#2563EB" fill-opacity="0.06"/>
  <ellipse cx="950" cy="95" rx="140" ry="100" fill="#2563EB" fill-opacity="0.04"/>

  <!-- Logo icon -->
  <rect x="280" y="67" width="48" height="48" rx="10" fill="#2563EB"/>
  <path d="M294 83 L287 91 L294 99" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M310 83 L317 91 L310 99" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="302" cy="91" r="3" fill="white"/>

  <!-- Lynch Digital wordmark -->
  <text x="344" y="101" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="36" fill="#FFFFFF" letter-spacing="-1">Lynch</text>
  <text x="444" y="101" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="36" fill="#2563EB" letter-spacing="-0.5">Digital</text>

  <!-- Divider -->
  <rect x="280" y="118" width="260" height="1" fill="#1E293B"/>

  <!-- Tagline -->
  <text x="280" y="142" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="15" fill="#94A3B8" letter-spacing="0.5">Websites · Booking Systems · AI Solutions</text>

  <!-- Right side services pills -->
  <rect x="700" y="72" width="160" height="32" rx="16" fill="#1E293B" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <text x="780" y="93" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="13" fill="#CBD5E1" text-anchor="middle">Web Design</text>

  <rect x="876" y="72" width="180" height="32" rx="16" fill="#1E293B" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <text x="966" y="93" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="13" fill="#CBD5E1" text-anchor="middle">Booking Systems</text>

  <rect x="700" y="116" width="160" height="32" rx="16" fill="#1E293B" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <text x="780" y="137" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="13" fill="#CBD5E1" text-anchor="middle">AI Solutions</text>

  <rect x="876" y="116" width="180" height="32" rx="16" fill="#1E293B" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <text x="966" y="137" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="13" fill="#CBD5E1" text-anchor="middle">lynchdigital.ie</text>

  <!-- Bottom accent line -->
  <rect y="188" width="1128" height="3" fill="#2563EB" fill-opacity="0.4"/>
</svg>
