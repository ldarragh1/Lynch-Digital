<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" fill="none">
  <!-- Background -->
  <rect width="1584" height="396" fill="#0F172A"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#0F172A;stop-opacity:0" />
      <stop offset="70%" style="stop-color:#0F172A;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1584" height="396" fill="url(#grid)"/>
  <rect width="1584" height="396" fill="url(#fade)"/>

  <!-- Blue accent top -->
  <rect width="1584" height="4" fill="#2563EB"/>

  <!-- Glow blobs -->
  <ellipse cx="400" cy="198" rx="300" ry="200" fill="#2563EB" fill-opacity="0.05"/>
  <ellipse cx="1200" cy="198" rx="250" ry="180" fill="#2563EB" fill-opacity="0.04"/>

  <!-- Logo icon -->
  <rect x="420" y="148" width="72" height="72" rx="14" fill="#2563EB"/>
  <path d="M440 172 L430 184 L440 196" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M472 172 L482 184 L472 196" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="456" cy="184" r="5" fill="white"/>

  <!-- Lynch Digital wordmark -->
  <text x="512" y="202" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="56" fill="#FFFFFF" letter-spacing="-2">Lynch</text>
  <text x="692" y="202" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="56" fill="#2563EB" letter-spacing="-1">Digital</text>

  <!-- Divider -->
  <rect x="420" y="234" width="400" height="1.5" fill="#1E293B"/>

  <!-- Tagline -->
  <text x="420" y="268" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="22" fill="#94A3B8" letter-spacing="1">Websites · Booking Systems · AI Solutions</text>

  <!-- Right side pills -->
  <rect x="1020" y="148" width="200" height="44" rx="22" fill="#1E293B" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1120" y="176" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="18" fill="#CBD5E1" text-anchor="middle">Web Design</text>

  <rect x="1240" y="148" width="220" height="44" rx="22" fill="#1E293B" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1350" y="176" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="18" fill="#CBD5E1" text-anchor="middle">Booking Systems</text>

  <rect x="1020" y="208" width="200" height="44" rx="22" fill="#1E293B" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1120" y="236" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="18" fill="#CBD5E1" text-anchor="middle">AI Solutions</text>

  <rect x="1240" y="208" width="220" height="44" rx="22" fill="#1E293B" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1350" y="236" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="18" fill="#CBD5E1" text-anchor="middle">lynchdigital.ie</text>

  <!-- Bottom accent -->
  <rect y="392" width="1584" height="4" fill="#2563EB" fill-opacity="0.4"/>
</svg>
